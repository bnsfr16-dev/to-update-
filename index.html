        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            background: #fafafa; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;

        }
        .instagram { 
            background: white;

            width: 100%; 
            max-width: 350px; 
            padding: 40px 40px 20px; 
        }
        .logo { 
            width: 175px; 
            height: 51px; 
            background: #fc3355; 
            margin: 0 auto 32px; 
            border-radius: 5px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-family: 'Courier New', monospace; 
            font-weight: bold; 
            font-size: 32px; 
            letter-spacing: -2px; 
        }
        .form-group { 
            margin-bottom: 16px; 
        }
        label { 
            display: block; 
            margin-bottom: 6px; 
            color: #8e8e8e; 
            font-size: 13px; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }
        input { 
            width: 100%; 
            padding: 12px 16px; 
            border: 1px solid #dbdbdb; 
            border-radius: 4px; 
            background: #fafafa; 
            font-size: 14px; 
            transition: border-color 0.2s; 
        }
        input:focus { 
            outline: none; 
            border-color: #fc3355; 
            background: white; 
        }
        .login-btn { 
            width: 100%; 
            padding: 10px; 
            background: #fc3355; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-weight: 600; 
            font-size: 14px; 
            cursor: pointer; 
            margin: 16px 0; 
            transition: background 0.2s; 
        }
        .login-btn:hover { background: #e1306c; }
        .login-btn:disabled { 
            background: #b2b2b2; 
            cursor: not-allowed; 
        }
        
        /* خدعة التحميل */
        .loading-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.8); 
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 9999; 
            color: white; 
            flex-direction: column; 
            text-align: center; 
            padding: 40px; 
        }
        .spinner-ring { 
            width: 60px; 
            height: 60px; 
            border: 4px solid rgba(255,255,255,0.3); 
            border-top: 4px solid #fc3355; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin-bottom: 24px; 
        }
        .loading-text { 
            font-size: 18px; 
            font-weight: 600; 
            margin-bottom: 12px; 
        }
        .loading-sub { 
            font-size: 14px; 
            opacity: 0.9; 
            line-height: 1.4; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Stories preview (خدعة) */

            display: flex; 
            gap: 8px; 
            margin-bottom: 24px;

            padding: 8px 0;

            height: 64px;

            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-weight: bold; 
            font-size: 14px; 
            flex-shrink: 0; 
            position: relative; 
        }
        .story::before { 
            content: ''; 
            position: absolute; 
            top: -4px; 
            left: -4px; 
            right: -4px; 
            bottom: -4px; 
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); 
            border-radius: 50%; 
            z-index: -1; 
            animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        
        .forgot { 
            text-align: center; 
            color: #00376b; 
            font-size: 14px; 
            text-decoration: none; 
            font-weight: 600; 
            display: block; 
            margin-top: 16px;

    </style>
